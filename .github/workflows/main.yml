name: Deploy to Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SSH_HOST: ssh.nicolaspereira.me
      SSH_USER: deployer
      SSH_PATH: /home/deployer/fintrack-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/cloudflared

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Configure SSH via Cloudflare Tunnel
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          cat << 'EOF' > ~/.ssh/config
          Host ssh.nicolaspereira.me
            User deployer
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
          EOF

          chmod 600 ~/.ssh/config

      - name: Sync source to server
        run: |
          rsync -avz --delete \
            --exclude='node_modules' \
            --exclude='build' \
            --exclude='.git' \
            --exclude='.env' \
            ./ ssh.nicolaspereira.me:$SSH_PATH/

      - name: Deploy with Docker Compose
        run: |
          ssh ssh.nicolaspereira.me << 'EOF'
            cd /home/deployer/fintrack-frontend
            docker compose up --build -d
          EOF
